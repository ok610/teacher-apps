<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <title>Teacher Apps</title>

  <!-- ===== PWA 필수 메타 ===== -->
  <meta name="theme-color" content="#5E5CE6" />
  <link rel="manifest" href="./manifest.json" />

  <!-- iOS 홈 화면 추가 대응 -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Teacher Apps" />
  <link rel="apple-touch-icon" href="./icons/icon-192.png" />

  <!-- ===== 스타일시트 (역할별 분리) ===== -->
  <link rel="stylesheet" href="./css/variables.css" />
  <link rel="stylesheet" href="./css/reset.css" />
  <link rel="stylesheet" href="./css/layout.css" />
  <link rel="stylesheet" href="./css/home.css" />
  <link rel="stylesheet" href="./css/timer.css" />
  <link rel="stylesheet" href="./css/settings.css" />
</head>
<body>

  <div id="app">
    <!-- ============ 공통 상단 헤더 ============ -->
    <header class="app-header">
      <button id="header-back" class="app-header__back" style="visibility:hidden">
        <svg viewBox="0 0 24 24" fill="none"><path d="M15 6l-6 6 6 6" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
        홈
      </button>
      <h1 id="header-title" class="app-header__title">Teacher Apps</h1>
      <div id="header-action-slot"></div>
    </header>

    <!-- ============ Home 화면 ============ -->
    <section class="view home is-active" data-view="home">
      <div class="home__greeting">
        <p class="home__greeting-sub">오늘 수업에 어떤 도구가 필요하신가요?</p>
      </div>
      <div id="home-grid" class="feature-grid"></div>
    </section>

    <!-- ============ Timer 화면 ============ -->
    <section class="view timer" data-view="timer" id="view-timer">
      <p class="timer-preset-label">설정 : <strong>-</strong></p>

      <div class="timer-ring-wrap">
        <div class="timer-ring">
          <svg viewBox="0 0 260 260">
            <circle class="timer-ring__track" cx="130" cy="130" r="120" />
            <circle class="timer-ring__progress" cx="130" cy="130" r="120" />
          </svg>
          <div class="timer-ring__center">
            <span class="timer-ring__time">00:00</span>
            <span class="timer-ring__state">준비</span>
          </div>
        </div>
      </div>

      <div class="timer-controls">
        <button class="btn--icon is-secondary" data-action="reset" aria-label="리셋">
          <svg viewBox="0 0 24 24" fill="none"><path d="M4 4v5h5" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/><path d="M4.5 12a7.5 7.5 0 1 0 2.2-5.3L4 9" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <button class="btn--icon is-main" data-action="toggle" aria-label="시작/일시정지">
          <span data-icon></span>
        </button>
        <button class="btn--icon is-secondary" data-action="edit-time" aria-label="시간 설정">
          <svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="2.2"/><path d="M12 7v5l3.5 2" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
      </div>

      <div class="favorites">
        <div class="favorites__header">
          <span class="favorites__title">즐겨찾기</span>
          <button class="favorites__edit" data-action="edit-favorites">편집</button>
        </div>
        <div class="favorites__list"></div>
      </div>
    </section>

    <!-- 향후 기능 화면은 여기에 <section class="view" data-view="..."> 형태로 추가 -->
  </div>

  <!-- ============ 공통 Sheet Overlay ============ -->
  <div id="sheet-overlay" class="sheet-overlay"></div>

  <!-- ============ 시간 설정 Sheet ============ -->
  <div id="time-sheet" class="sheet">
    <div class="sheet__grabber"></div>
    <div class="sheet__header">
      <span></span>
      <span id="time-sheet-title" class="sheet__title">시간 설정</span>
      <button id="time-sheet-close" class="sheet__done">닫기</button>
    </div>
    <div class="sheet__body">
      <div class="time-picker">
        <div class="time-picker__col">
          <button class="time-picker__stepper" data-step="-5">−5</button>
        </div>
        <div class="time-picker__col">
          <span id="time-picker-value" class="time-picker__value">5분</span>
          <span class="time-picker__caption">1 ~ 120분</span>
        </div>
        <div class="time-picker__col">
          <button class="time-picker__stepper" data-step="5">+5</button>
        </div>
      </div>
      <div class="time-picker" style="padding-top:0">
        <button class="time-picker__stepper" data-step="-1" style="width:44px;height:44px;font-size:1.2rem;">−1</button>
        <button class="time-picker__stepper" data-step="1" style="width:44px;height:44px;font-size:1.2rem;">+1</button>
      </div>
      <button id="time-sheet-confirm" class="btn btn--primary" style="width:100%; margin-top: 8px;">확인</button>
    </div>
  </div>

  <!-- ============ 즐겨찾기 편집 Sheet ============ -->
  <div id="fav-edit-sheet" class="sheet">
    <div class="sheet__grabber"></div>
    <div class="sheet__header">
      <span></span>
      <span class="sheet__title">즐겨찾기 편집</span>
      <button id="fav-edit-close" class="sheet__done">닫기</button>
    </div>
    <div class="sheet__body">
      <div id="fav-edit-list"></div>
    </div>
  </div>

  <!-- ============ 타이머 설정 Sheet ============ -->
  <div id="settings-sheet" class="sheet">
    <div class="sheet__grabber"></div>
    <div class="sheet__header">
      <span></span>
      <span class="sheet__title">타이머 설정</span>
      <button id="settings-sheet-close" class="sheet__done">닫기</button>
    </div>
    <div class="sheet__body">
      <div class="settings-section">
        <div class="settings-section__title">타이머 색상</div>
        <div id="color-swatches" class="swatch-row"></div>
      </div>

      <div class="settings-section">
        <div class="settings-section__title">배경색</div>
        <div id="bg-swatches" class="swatch-row"></div>
      </div>

      <div class="settings-section">
        <div class="settings-section__title">종료 사운드</div>
        <div id="sound-options"></div>
      </div>

      <div class="settings-section">
        <div class="setting-row">
          <span class="setting-row__label">애니메이션 (종료 임박 깜빡임)</span>
          <button id="toggle-animation" class="switch"></button>
        </div>
        <div class="setting-row">
          <span class="setting-row__label">다크 모드</span>
          <button id="toggle-darkmode" class="switch"></button>
        </div>
      </div>
    </div>
  </div>

  <!-- ============ 스크립트 (역할별 분리, 의존성 순서 유지) ============ -->
  <script src="./js/storage.js"></script>
  <script src="./js/icons.js"></script>
  <script src="./js/sounds.js"></script>
  <script src="./js/home.js"></script>
  <script src="./js/timer.js"></script>
  <script src="./js/app.js"></script>
</body>
</html>
