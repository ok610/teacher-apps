<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <title>Teacher Apps</title>

  <!-- ===== PWA 필수 메타 ===== -->
  <meta name="theme-color" content="#0B1F1A" />
  <link rel="manifest" href="./manifest.json" />

  <!-- iOS 홈 화면 추가 대응 -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Teacher Apps" />
  <link rel="apple-touch-icon" href="./icons/icon-192.png" />

  <!-- ===== 스타일시트 (역할별 분리) ===== -->
  <link rel="stylesheet" href="./css/variables.css" />
  <link rel="stylesheet" href="./css/reset.css" />
  <link rel="stylesheet" href="./css/components.css" />
  <link rel="stylesheet" href="./css/layout.css" />
  <link rel="stylesheet" href="./css/home.css" />
  <link rel="stylesheet" href="./css/timer.css" />
  <link rel="stylesheet" href="./css/settings-panel.css" />

  <!-- ===== 테마 부트스트랩 (깜빡임 방지) =====
       storage.js / theme.js는 defer 없이, 가장 먼저 로드합니다.
       그래야 body가 그려지기 전에 저장된 테마 색상을 적용할 수 있습니다.
       (자세한 이유는 js/theme.js 상단 주석 참고) -->
  <script src="./js/storage.js"></script>
  <script src="./js/theme.js"></script>
</head>
<body>

  <div id="app">
    <!-- ============ 공통 상단 헤더 ============ -->
    <header class="app-header">
      <button id="header-back" class="app-header__back" style="visibility:hidden">
        <svg viewBox="0 0 24 24" fill="none"><path d="M15 6l-6 6 6 6" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
        홈
      </button>
      <h1 id="header-title" class="app-header__title">Teacher Apps</h1>
      <div id="header-action-slot"></div>
    </header>

    <!-- ============ Home 화면 ============ -->
    <section class="view home is-active" data-view="home">
      <div class="home__greeting">
        <p class="home__greeting-sub">오늘 수업에 어떤 도구가 필요하신가요?</p>
      </div>
      <div id="home-grid" class="feature-grid"></div>
    </section>

    <!-- ============ Timer 화면 ============ -->
    <section class="view timer" data-view="timer" id="view-timer">
      <p class="timer-preset-label" id="timer-preset-label"></p>

      <div class="timer-dial-wrap">
        <div class="timer-dial" id="timer-dial">
          <svg viewBox="0 0 300 300">
            <circle class="timer-dial__track" cx="150" cy="150" r="116" />
            <path class="timer-dial__progress" id="timer-progress-path" d="" />
            <circle class="timer-dial__knob" id="timer-knob" r="15" cx="150" cy="34" />
            <g class="timer-dial__ticks" id="timer-ticks"></g>
          </svg>
          <div class="timer-dial__center">
            <span class="timer-dial__time" id="timer-time">00:00</span>
            <span class="timer-dial__state" id="timer-state">준비</span>
            <p class="timer-dial__finished-text">시간이<br />종료되었습니다</p>
          </div>
        </div>
      </div>

      <p class="timer-drag-hint" id="timer-hint"></p>

      <div class="timer-fine-adjust">
        <button class="timer-fine-adjust__btn" data-adjust="-60">−1분</button>
        <button class="timer-fine-adjust__btn" data-adjust="-10">−10초</button>
        <button class="timer-fine-adjust__btn" data-adjust="10">+10초</button>
        <button class="timer-fine-adjust__btn" data-adjust="60">+1분</button>
      </div>

      <div class="timer-controls">
        <button class="btn btn--secondary" id="timer-reset-btn">리셋</button>
        <button class="btn btn--primary" id="timer-primary-btn">시작</button>
        <button class="btn btn--primary" id="timer-confirm-btn" hidden>확인</button>
      </div>

      <div class="favorites">
        <div class="favorites__header">
          <span class="favorites__title">즐겨찾기</span>
        </div>
        <div class="favorites__list" id="favorites-list"></div>
      </div>
    </section>

    <!-- 향후 기능 화면은 여기에 <section class="view" data-view="..."> 형태로 추가 -->
  </div>

  <!-- ============ 설정 Side Panel (오른쪽에서 슬라이드) ============ -->
  <div id="settings-overlay" class="side-overlay"></div>
  <aside id="settings-panel" class="side-panel">
    <div class="side-panel__header">
      <span class="side-panel__title">설정</span>
      <button id="settings-panel-close" class="side-panel__close" aria-label="닫기">
        <svg viewBox="0 0 24 24" fill="none"><path d="M6 6l12 12M18 6L6 18" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"/></svg>
      </button>
    </div>
    <div class="side-panel__body">

      <section class="settings-section">
        <h3 class="settings-section__title">앱 테마</h3>
        <div id="theme-grid" class="theme-grid"></div>
      </section>

      <section class="settings-section">
        <h3 class="settings-section__title">효과음</h3>
        <select id="sound-select" class="field"></select>
        <div class="volume-row">
          <span class="volume-row__label">볼륨</span>
          <input id="volume-range" type="range" min="0" max="100" value="70" />
        </div>
        <button id="sound-preview" class="btn btn--secondary btn--block btn--sm" style="margin-top:10px;">🔊 미리듣기</button>
      </section>

      <section class="settings-section">
        <h3 class="settings-section__title">즐겨찾기 관리</h3>
        <div class="fav-add-form">
          <input id="fav-name-input" type="text" placeholder="이름 (예: 모둠 토론)" class="field" maxlength="12" />
          <div class="fav-add-form__time">
            <input id="fav-min-input" type="number" min="0" max="60" value="5" class="field field--number" />
            <span>분</span>
            <input id="fav-sec-input" type="number" min="0" max="59" value="0" class="field field--number" />
            <span>초</span>
            <button id="fav-add-btn" class="btn btn--primary btn--sm" style="flex-shrink:0;">추가</button>
          </div>
        </div>
        <div id="fav-manage-list" class="fav-manage-list"></div>
      </section>

      <section class="settings-section">
        <h3 class="settings-section__title">옵션</h3>
        <div class="setting-item">
          <span class="setting-item__label">즐겨찾기 터치 시 바로 시작</span>
          <label class="toggle-switch">
            <input type="checkbox" id="toggle-tap-to-start" />
            <span class="toggle-switch__track"></span>
          </label>
        </div>
      </section>

    </div>
  </aside>

  <!-- ============ 스크립트 (역할별 분리, 의존성 순서 유지) ============ -->
  <script src="./js/icons.js"></script>
  <script src="./js/sounds.js"></script>
  <script src="./js/home.js"></script>
  <script src="./js/timer.js"></script>
  <script src="./js/app.js"></script>
</body>
</html>
